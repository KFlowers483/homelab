apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: vlan30-pool
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  addresses:
  - 192.168.30.200-192.168.30.220
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: vlan30-l2
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ipAddressPools:
  - vlan30-pool
